<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赛博番茄钟 // 矩阵觉醒 · 专注助眠系统</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-dim: #444444;
            --text-bright: #888888;
            --accent: #00ffcc;
            --accent-dim: #008866;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --font-mono: 'Courier New', Courier, monospace;
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
            perspective: 1000px;
            touch-action: none; /* 提升触摸响应，避免滚动干扰，但保留内部按钮可点 */
        }

        /* 触摸优化：所有可点击元素增加足够区域 */
        button, .select-icon, .sound-btn, .music-btn, .back-link, .back-link-sleep, .vinyl-player {
            touch-action: manipulation;
        }

        .cursor-glow {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.3s, transform 0.1s;
            transform: translate(-50%, -50%);
        }

        .cursor-glow.active {
            opacity: 0.6;
            animation: pulse-cursor 1.5s infinite;
        }

        @keyframes pulse-cursor {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.5); }
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            opacity: 0.3;
        }

        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .matrix-rain-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #000000;
            z-index: 0;
            pointer-events: none;
        }

        .matrix-pattern {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .matrix-column {
            position: absolute;
            top: -100%;
            width: 20px;
            height: 200%;
            font-size: 16px;
            line-height: 18px;
            font-weight: bold;
            animation: fall linear infinite;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0.8;
        }

        .matrix-column::before {
            content: "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            position: absolute;
            top: 0; left: 0;
            background: linear-gradient(to bottom, #ffffff 0%, #ffffff 5%, #00ff41 10%, #00ff41 20%, #00dd33 30%, #00bb22 40%, #009911 50%, #007700 60%, #005500 70%, #003300 80%, rgba(0, 255, 65, 0.5) 90%, transparent 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            writing-mode: vertical-lr;
            letter-spacing: 1px;
        }

        .matrix-column:nth-child(odd)::before { content: "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン123456789"; }
        .matrix-column:nth-child(even)::before { content: "ガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポヴァィゥェォャュョッABCDEFGHIJKLMNOPQRSTUVWXYZ"; }
        .matrix-column:nth-child(3n)::before { content: "アカサタナハマヤラワイキシチニヒミリウクスツヌフムユルエケセテネヘメレオコソトノホモヨロヲン0987654321"; }
        .matrix-column:nth-child(5n)::before { content: "!@#$%^&*()_+-=[]{}|;:,.<>?ガザダバパギジヂビピグズヅブプ"; }

        @keyframes fall {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(50%); }
        }

        .vinyl-player {
            position: fixed;
            top: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            z-index: 10001;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s var(--transition-smooth);
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0));
        }

        .vinyl-player.visible {
            opacity: 1;
            transform: scale(1);
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.3));
        }

        .vinyl-player:hover {
            filter: drop-shadow(0 0 30px rgba(0, 255, 204, 0.6));
            transform: scale(1.1);
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                repeating-radial-gradient(circle at center, #1a1a1a 0px, #0a0a0a 2px, #1a1a1a 3px);
            border: 2px solid var(--text-dim);
            box-shadow: 
                0 0 0 1px rgba(0, 255, 204, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.8);
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        .vinyl-player.playing .vinyl-disc {
            animation-play-state: running;
            border-color: var(--accent);
            box-shadow: 
                0 0 20px var(--accent-glow),
                0 0 0 1px var(--accent),
                inset 0 0 30px rgba(0, 255, 204, 0.1);
        }

        .vinyl-player.pausing .vinyl-disc {
            animation: spin 4s linear infinite, slow-down 1s var(--transition-smooth) forwards;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slow-down {
            to { transform: rotate(var(--rotation, 0deg)); animation-play-state: paused; }
        }

        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-dim) 0%, #000 100%);
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .vinyl-label::after {
            content: '◉';
            color: var(--accent);
            font-size: 12px;
            text-shadow: 0 0 5px var(--accent);
        }

        .vinyl-grooves {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 204, 0.1);
            pointer-events: none;
        }

        .vinyl-grooves::before,
        .vinyl-grooves::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 204, 0.05);
        }

        .vinyl-grooves::before {
            top: 15%;
            left: 15%;
            right: 15%;
            bottom: 15%;
        }

        .vinyl-grooves::after {
            top: 30%;
            left: 30%;
            right: 30%;
            bottom: 30%;
        }

        .vinyl-status {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s;
        }

        .vinyl-player:hover .vinyl-status {
            opacity: 1;
            color: var(--accent);
        }

        .vinyl-player.playing .vinyl-status::after {
            content: 'PLAYING';
            animation: pulse-text 1.5s infinite;
        }

        .vinyl-player:not(.playing) .vinyl-status::after {
            content: 'PAUSED';
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .vinyl-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            pointer-events: none;
        }

        .vinyl-player.clicked .vinyl-ripple {
            animation: ripple-effect 0.6s ease-out;
        }

        @keyframes ripple-effect {
            0% {
                width: 100%;
                height: 100%;
                opacity: 0.8;
                border-width: 2px;
            }
            100% {
                width: 200%;
                height: 200%;
                opacity: 0;
                border-width: 0px;
            }
        }

        .vinyl-data-stream {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 0.5rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .vinyl-player.playing .vinyl-data-stream {
            opacity: 0.6;
            animation: data-flicker 0.5s infinite;
        }

        @keyframes data-flicker {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        #boot-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10000;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.8s var(--transition-smooth);
        }

        .tech-core {
            position: relative;
            width: 300px; height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
            z-index: 2;
            transition: transform 0.5s var(--transition-bounce);
        }

        .tech-core:hover { transform: scale(1.05); }

        .ring {
            position: absolute;
            border: 1px solid var(--text-dim);
            border-radius: 50%;
            opacity: 0;
            transition: border-color 0.3s;
        }

        .ring:hover { border-color: var(--accent); }

        .ring-1 { width: 100%; height: 100%; border-top-color: var(--accent); border-right-color: transparent; animation: rotateCW 8s linear infinite, fadeIn 0.5s forwards 0.5s; }
        .ring-2 { width: 80%; height: 80%; border-bottom-color: var(--accent); border-left-color: transparent; animation: rotateCCW 6s linear infinite, fadeIn 0.5s forwards 0.8s; }
        .ring-3 { width: 60%; height: 60%; border: 1px dashed var(--text-bright); animation: rotateCW 4s linear infinite, fadeIn 0.5s forwards 1.1s; }
        .core-center {
            width: 40%; height: 40%;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: pulse 2s ease-in-out infinite, fadeIn 0.5s forwards 1.4s;
        }

        @keyframes rotateCW { to { transform: rotate(360deg); } }
        @keyframes rotateCCW { to { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } }
        @keyframes fadeIn { to { opacity: 1; } }

        .boot-text {
            font-size: 1.2rem;
            color: var(--text-dim);
            letter-spacing: 8px;
            opacity: 0;
            animation: textGlow 2s ease-in-out infinite alternate, fadeIn 0.5s forwards 1.8s;
            z-index: 2;
        }

        @keyframes textGlow {
            from { color: var(--text-dim); text-shadow: none; }
            to { color: var(--accent); text-shadow: 0 0 20px var(--accent-dim); }
        }

        .progress-container {
            width: 400px; max-width: 80vw;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 0.5s forwards 2.2s;
            z-index: 2;
        }

        .progress-label {
            font-size: 0.7rem;
            color: var(--text-bright);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 2px;
            background: var(--text-dim);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent-dim), var(--accent));
            box-shadow: 0 0 10px var(--accent);
        }

        #select-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9997;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s var(--transition-smooth);
        }

        .select-title {
            font-size: 0.9rem;
            color: var(--text-bright);
            letter-spacing: 6px;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(-20px);
        }

        .select-title.show { animation: slideDown 0.6s var(--transition-smooth) forwards; }

        @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

        .icon-wrapper { display: flex; gap: 120px; align-items: center; }

        .select-icon {
            width: 200px; height: 200px;
            border: 1px solid var(--text-dim);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8) rotateX(0deg) rotateY(0deg);
            transition: all 0.4s var(--transition-smooth);
            position: relative;
            transform-style: preserve-3d;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 50%);
        }

        .select-icon::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, transparent 50%, var(--accent-dim) 100%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .select-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(0,255,204,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            transform: translateZ(-20px);
        }

        .select-icon:hover::before { opacity: 0.5; }
        .select-icon:hover::after { opacity: 1; }

        .select-icon.show-left { animation: iconEnterLeft 0.8s var(--transition-smooth) forwards; }
        .select-icon.show-right { animation: iconEnterRight 0.8s var(--transition-smooth) forwards; }

        @keyframes iconEnterLeft { from { opacity: 0; transform: translateX(-80px) scale(0.8); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes iconEnterRight { from { opacity: 0; transform: translateX(80px) scale(0.8); } to { opacity: 1; transform: translateX(0) scale(1); } }

        .icon-expand { animation: iconExpand 0.6s var(--transition-smooth) forwards !important; }
        @keyframes iconExpand { to { width: 100vw; height: 100vh; opacity: 0; } }

        .icon-hide { opacity: 0 !important; transform: scale(0.8) !important; }

        .icon-graphic {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--text-bright);
            transition: all 0.3s;
            transform: translateZ(30px);
        }

        .select-icon:hover .icon-graphic {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
            transform: translateZ(50px) scale(1.1);
        }

        .icon-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 4px;
            transition: all 0.3s;
            transform: translateZ(20px);
        }

        .select-icon:hover .icon-label {
            letter-spacing: 6px;
            color: var(--accent);
        }

        #pomo-terminal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9996;
            background: #000;
            display: none;
            opacity: 0;
            transition: opacity 0.5s var(--transition-smooth);
        }

        .pomo-container { display: flex; width: 100%; height: 100%; }

        .watcher-area {
            width: 33.333%; height: 100%;
            border-right: 1px solid var(--text-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0, 255, 204, 0.03) 0%, transparent 70%);
            position: relative;
            overflow: hidden;
        }

        .watcher-area canvas {
            max-width: 100%;
            height: auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .watcher-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent 49%, rgba(0, 255, 204, 0.03) 50%, transparent 51%);
            background-size: 10px 10px;
            animation: grid-move 20s linear infinite;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10px, 10px); }
        }

        .watcher-status {
            position: absolute; bottom: 60px;
            font-size: 0.8rem; color: var(--text-bright);
            letter-spacing: 3px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .timer-area {
            width: 66.666%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .terminal-header {
            position: absolute; top: 40px; left: 60px; right: 60px;
            display: flex; justify-content: space-between;
            font-size: 0.8rem; color: var(--text-bright);
        }

        .back-link {
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-dim);
            position: relative;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .back-link:hover { color: var(--accent); letter-spacing: 4px; }
        .back-link:hover::after { width: 100%; }

        .mode-display {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 300;
            color: var(--text-primary);
            margin-bottom: 50px;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-bright);
            padding: 15px 40px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            border-radius: 30px;
        }

        .control-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-dim);
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: translateY(1px);
        }

        .control-btn.primary {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 204, 0.1);
        }

        .control-btn.primary:hover {
            background: var(--accent);
            color: #000;
        }

        .cycle-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .music-controls {
            margin-top: 30px;
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .music-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-bright);
            padding: 12px 28px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.35s var(--transition-smooth);
            border-radius: 40px;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .music-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,204,0.15), transparent);
            transition: left 0.6s;
            z-index: -1;
        }

        .music-btn:hover::before {
            left: 100%;
        }

        .music-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 18px var(--accent-glow);
            transform: translateY(-3px);
        }

        .music-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 204, 0.08);
            box-shadow: 0 0 22px var(--accent-dim), inset 0 0 8px rgba(0,255,204,0.2);
            animation: pulse-glow 1.8s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px var(--accent-dim), inset 0 0 4px rgba(0,255,204,0.2); }
            100% { box-shadow: 0 0 28px var(--accent), inset 0 0 12px rgba(0,255,204,0.4); }
        }

        .music-btn .icon-symbol {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 4px currentColor);
        }

        .music-btn .btn-text {
            font-weight: bold;
        }

        #sleep-terminal {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;

            letter-spacing: 6px;
            margin-bottom: 60px;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 600px;
            max-width: 80%;
            margin-bottom: 50px;
        }

        .sound-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            padding: 40px 20px;
            text-align: center;

            transition: all 0.4s var(--transition-smooth);

            touch-action: manipulation;
        }

        .sound-btn:hover, .sound-btn.active {
            border-color: var(--accent);

            background: rgba(0, 255, 204, 0.05);
        }

        .sound-icon { font-size: 2rem; margin-bottom: 15px; display: block; font-weight: bold; letter-spacing: 0; text-shadow: 0 0 4px currentColor; }
        .sound-name { font-size: 0.8rem; letter-spacing: 2px; }

        .volume-box {
            width: 600px;
            max-width: 80%;
            border: 1px solid var(--text-dim);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-radius: 30px;
        }

        .volume-label { font-size: 0.8rem; color: var(--text-bright); min-width: 40px; }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--text-dim);
            outline: none;
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            cursor: pointer;
            border-radius: 50%;
        }

        .volume-value { font-size: 0.8rem; color: var(--accent); min-width: 30px; text-align: right; }

        .buddha-area {
            width: 33.333%; height: 100%;
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .buddha-area canvas {
            max-width: 100%;
            height: auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .buddha-text {
            position: absolute; bottom: 60px;
            font-size: 0.8rem; color: var(--text-bright);
            letter-spacing: 3px; text-align: center;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px; border-radius: 20px;
        }

        .back-link-sleep {
            position: absolute; top: 40px; left: 60px;
            cursor: pointer; transition: all 0.3s;
            color: var(--text-dim); font-size: 0.8rem;
        }

        .back-link-sleep:hover { color: var(--accent); letter-spacing: 4px; }

        .terminal-cursor {
            display: inline-block;

            height: 1.2em;

            animation: cursor-blink 1s step-end infinite;

        }

        @keyframes cursor-blink {

        @media (max-width: 1200px) {

        .loading-screen {
            position: fixed;

        }

            background: var(--accent);
            animation: loading 2s linear forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>

</div><div class="volume-box"><span class="volume-label">音量</span><input type="range" class="volume-slider" min="0" max="100" value="50" oninput="updateVolume(this.value)"><span class="volume-value" id="vol-display">50</span></div></div><div class="buddha-area"><canvas id="buddha-canvas" width="300" height="450"></canvas><div class="buddha-text">一花一世界<br>一叶一菩提</div></div></div></div>

    <script>
        // ==================== 音频系统 & 番茄钟原有逻辑 ====================
        let audioContext = null;
        const bgMusic = document.getElementById('bg-music');
        const vinylPlayer = document.getElementById('vinyl-player');
        let isMusicPlaying = false;
        let currentRotation = 0;
        function getAudioContext() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); return audioContext; }
        function playSingingBowl() { const ctx = getAudioContext(); const now = ctx.currentTime; [220,440,660,880,1100].forEach((freq,i)=>{ const osc=ctx.createOscillator(), gain=ctx.createGain(), filter=ctx.createBiquadFilter(); osc.type='sine'; osc.frequency.value=freq; filter.type='lowpass'; filter.frequency.value=2000; gain.gain.setValueAtTime(0,now); gain.gain.linearRampToValueAtTime([0.3,0.2,0.15,0.1,0.05][i],now+0.1); gain.gain.exponentialRampToValueAtTime(0.001,now+3); osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+3); }); }
        
        function initVinylPlayer() { vinylPlayer.addEventListener('click', toggleMusic); }
        function toggleMusic() { vinylPlayer.classList.add('clicked'); setTimeout(()=>vinylPlayer.classList.remove('clicked'),600); if(isMusicPlaying){ bgMusic.pause(); isMusicPlaying=false; vinylPlayer.classList.remove('playing'); }else{ bgMusic.volume=0.7; bgMusic.play().catch(e=>console.log); isMusicPlaying=true; vinylPlayer.classList.add('playing'); } }
        
        // ===== JAZZ & LOFI 音乐 =====
        let activeMusicType = null;
        const jazzBtn = document.getElementById('jazz-music-btn');
        const lofiBtn = document.getElementById('lofi-music-btn');
        const jazzAudio = new Audio();
        const lofiAudio = new Audio();
        jazzAudio.loop = true;
        lofiAudio.loop = true;
        jazzAudio.volume = 0.5;
        lofiAudio.volume = 0.5;
        jazzAudio.src = "【Playlist】复古爵士乐Cooking with Pooh🧸🎧1小时Jazz音乐歌单工作学习休闲放松.mp3";
        lofiAudio.src = "重新认识一下，我是Chilled Cow，现在叫Lofi Girl，那个千万播放的学习陪伴视频回来啦.mp3";
        jazzAudio.preload = 'auto';
        lofiAudio.preload = 'auto';
        jazzAudio.addEventListener('error', (e) => console.warn('Jazz音频加载失败:', jazzAudio.src, e));
        lofiAudio.addEventListener('error', (e) => console.warn('Lofi音频加载失败:', lofiAudio.src, e));
        
        function stopPomoMusic() {
            if (jazzAudio) { jazzAudio.pause(); jazzAudio.currentTime = 0; }
            if (lofiAudio) { lofiAudio.pause(); lofiAudio.currentTime = 0; }
            if (activeMusicType === 'jazz') jazzBtn.classList.remove('active');
            if (activeMusicType === 'lofi') lofiBtn.classList.remove('active');
            activeMusicType = null;
        }
        
        async function playPomoMusic(type) {
            if (activeMusicType === type) {
                if (type === 'jazz') { jazzAudio.pause(); jazzBtn.classList.remove('active'); activeMusicType = null; }
                else { lofiAudio.pause(); lofiBtn.classList.remove('active'); activeMusicType = null; }
                return;
            }
            stopPomoMusic();
            const targetAudio = (type === 'jazz') ? jazzAudio : lofiAudio;
            try {
                targetAudio.currentTime = 0;
                if (targetAudio.readyState < 2) {
                    await new Promise(resolve => {
                        const onCanPlay = () => { targetAudio.removeEventListener('canplaythrough', onCanPlay); resolve(); };
                        targetAudio.addEventListener('canplaythrough', onCanPlay);
                        targetAudio.load();
                        setTimeout(resolve, 2000);
                    });
                }
                await targetAudio.play();
                if (type === 'jazz') { jazzBtn.classList.add('active'); activeMusicType = 'jazz'; }
                else { lofiBtn.classList.add('active'); activeMusicType = 'lofi'; }
            } catch (err) { console.error(`播放 ${type} 音乐失败:`, err); }
        }
        
        function resetPomoMusicUI() { stopPomoMusic(); }
        
        jazzBtn.addEventListener('click', (e) => { e.stopPropagation(); playPomoMusic('jazz'); });
        lofiBtn.addEventListener('click', (e) => { e.stopPropagation(); playPomoMusic('lofi'); });
        
        // 自定义光标 + 触摸适配
        const cursorGlow = document.getElementById('cursor-glow');
        let cursorActive=false, cursorTimeout;
        function handleMove(clientX, clientY) {
            cursorGlow.style.left=clientX+'px';
            cursorGlow.style.top=clientY+'px';
            if(!cursorActive){ cursorGlow.classList.add('active'); cursorActive=true; }
            clearTimeout(cursorTimeout);
            cursorTimeout=setTimeout(()=>{ cursorGlow.classList.remove('active'); cursorActive=false; },1000);
        }
        document.addEventListener('mousemove', (e)=> handleMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => { 
            if(e.touches[0]) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        document.addEventListener('touchstart', (e) => {
            if(e.touches[0]) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        // 3D倾斜（触摸时忽略倾斜但保留样式）
        const selectIcons = document.querySelectorAll('.select-icon');
        selectIcons.forEach(icon=>{ icon.addEventListener('mousemove',(e)=>{ const rect=icon.getBoundingClientRect(); const x=e.clientX-rect.left, y=e.clientY-rect.top; const centerX=rect.width/2, centerY=rect.height/2; const rotateX=(y-centerY)/8, rotateY=(centerX-x)/8; icon.style.transform=`perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`; }); icon.addEventListener('mouseleave',()=>{ icon.style.transform='perspective(500px) rotateX(0deg) rotateY(0deg) scale(1)'; }); });
        
        function buildMatrixColumns(){ const container=document.getElementById('matrix-pattern-root'); if(!container) return; container.innerHTML=''; const columnWidth=22, columnCount=Math.ceil(window.innerWidth/columnWidth)+5; for(let i=0;i<columnCount;i++){ const col=document.createElement('div'); col.className='matrix-column'; col.style.left=(i*columnWidth)+'px'; col.style.animationDelay=(-Math.random()*5)+'s'; col.style.animationDuration=(2+Math.random()*3)+'s'; container.appendChild(col); } }
        function hideLoadingScreen(){ const ls=document.getElementById('loading-screen'); ls.style.opacity='0'; setTimeout(()=>{ ls.style.display='none'; document.getElementById('boot-screen').style.display='flex'; updateBootProgress(); },500); }
        let progress=0; function updateBootProgress(){ progress+=100/(3500/30); if(progress>=100){ progress=100; document.getElementById('progress-fill').style.width='100%'; document.getElementById('progress-text').textContent='100%'; setTimeout(showSelectScreen,300); }else{ document.getElementById('progress-fill').style.width=progress+'%'; document.getElementById('progress-text').textContent=Math.floor(progress)+'%'; setTimeout(updateBootProgress,30); } }
        function showSelectScreen(){ const boot=document.getElementById('boot-screen'), select=document.getElementById('select-screen'); boot.style.opacity='0'; setTimeout(()=>{ boot.style.display='none'; select.style.display='flex'; setTimeout(()=>{ select.style.opacity='1'; document.querySelector('.select-title').classList.add('show'); document.getElementById('icon-pomo').classList.add('show-left'); document.getElementById('icon-sleep').classList.add('show-right'); vinylPlayer.classList.add('visible'); initVinylPlayer(); setTimeout(()=>{ toggleMusic(); },800); },100); },800); }
        window.addEventListener('load',()=>{ buildMatrixColumns(); setTimeout(hideLoadingScreen,2000); });
        window.addEventListener('resize',buildMatrixColumns);
        
        document.getElementById('icon-pomo').addEventListener('click',function(){ playSingingBowl(); vinylPlayer.classList.remove('visible'); if(isMusicPlaying){ bgMusic.pause(); isMusicPlaying=false; vinylPlayer.classList.remove('playing'); } document.getElementById('icon-sleep').classList.add('icon-hide'); this.classList.add('icon-expand'); setTimeout(()=>{ document.getElementById('select-screen').style.display='none'; document.getElementById('pomo-terminal').style.display='block'; setTimeout(()=>{ document.getElementById('pomo-terminal').style.opacity='1'; initWatcher(); resetPomoMusicUI(); },100); },500); });
        document.getElementById('icon-sleep').addEventListener('click',function(){ vinylPlayer.classList.remove('visible'); if(isMusicPlaying){ bgMusic.pause(); isMusicPlaying=false; vinylPlayer.classList.remove('playing'); } document.getElementById('icon-pomo').classList.add('icon-hide'); this.classList.add('icon-expand'); setTimeout(()=>{ document.getElementById('select-screen').style.display='none'; document.getElementById('sleep-terminal').style.display='block'; setTimeout(()=>{ document.getElementById('sleep-terminal').style.opacity='1'; initBuddha(); },100); },500); });
        
        function backToSelect(){ 
            document.getElementById('pomo-terminal').style.opacity='0'; 
            document.getElementById('sleep-terminal').style.opacity='0'; 
            if(watcherAnimId) cancelAnimationFrame(watcherAnimId); 
            if(buddhaAnimId) cancelAnimationFrame(buddhaAnimId); 
            stopSleepMusic(); 
            stopPomoMusic(); 
            setTimeout(()=>{ 
                document.getElementById('pomo-terminal').style.display='none'; 
                document.getElementById('sleep-terminal').style.display='none'; 
                document.getElementById('select-screen').style.display='flex'; 
                document.getElementById('icon-pomo').classList.remove('icon-expand','icon-hide'); 
                document.getElementById('icon-sleep').classList.remove('icon-expand','icon-hide'); 
                document.getElementById('icon-pomo').style.opacity='1'; 
                document.getElementById('icon-sleep').style.opacity='1'; 
                document.getElementById('icon-pomo').style.transform=''; 
                document.getElementById('icon-sleep').style.transform=''; 
                vinylPlayer.classList.add('visible'); 
                if(!isMusicPlaying){ 
                    setTimeout(() => {
                        bgMusic.volume = 0.7;
                        bgMusic.play().catch(e => console.log);
                        isMusicPlaying = true;
                        vinylPlayer.classList.add('playing');
                    }, 500);
                }
                setTimeout(()=>document.getElementById('select-screen').style.opacity='1',100); 
            },500); 
        }
        
        // 番茄钟核心
        let timerInterval=null, isRunning=false, currentPhase='focus', cycles=0;
        const times={ focus:25*60, short:5*60, long:15*60 };
        let remainingTime=times.focus;
        const phaseNames={ focus:'专注模式', short:'短休息', long:'长休息' };
        function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        function updateTimerDisplay(){ document.getElementById('timer').textContent=formatTime(remainingTime); document.getElementById('cycle-info').textContent=`已完成周期：${cycles} / 4`; document.getElementById('pomo-mode').textContent=phaseNames[currentPhase]; }
        function toggleTimer(){ const btn=document.getElementById('btn-start'); if(isRunning){ clearInterval(timerInterval); isRunning=false; btn.textContent='开始'; btn.classList.add('primary'); }else{ isRunning=true; btn.textContent='暂停'; btn.classList.remove('primary'); timerInterval=setInterval(()=>{ if(remainingTime>0){ remainingTime--; updateTimerDisplay(); }else{ phaseTransition(); } },1000); } }
        function resetTimer(){ clearInterval(timerInterval); isRunning=false; remainingTime=times[currentPhase]; document.getElementById('btn-start').textContent='开始'; document.getElementById('btn-start').classList.add('primary'); updateTimerDisplay(); }
        function skipPhase(){ phaseTransition(); }
        function phaseTransition(){ clearInterval(timerInterval); isRunning=false; document.getElementById('btn-start').textContent='开始'; document.getElementById('btn-start').classList.add('primary'); if(currentPhase==='focus'){ cycles++; currentPhase=cycles>=4?'long':'short'; if(cycles>=4) cycles=0; }else{ currentPhase='focus'; } remainingTime=times[currentPhase]; updateTimerDisplay(); }
        if('Notification' in window) Notification.requestPermission();
        
        let watcherAnimId=null, watcherCanvas, watcherCtx, mouseX=window.innerWidth/2, mouseY=window.innerHeight/2, blinkTimer=0, isBlinking=false, nextBlinkTime=100, breathePhase=0, lastMouseTime=Date.now(), lookX=0, lookY=0, targetLookX=0, targetLookY=0, watcherState='normal', wingFlap=0, headTilt=0, targetHeadTilt=0;
        function initWatcher(){ watcherCanvas=document.getElementById('watcher-canvas'); watcherCtx=watcherCanvas.getContext('2d'); watcherCtx.imageSmoothingEnabled=false; 
            const moveHandler = (e) => { let cx, cy; if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; } else { cx = e.clientX; cy = e.clientY; } mouseX = cx; mouseY = cy; lastMouseTime = Date.now(); };
            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('touchmove', moveHandler);
            document.addEventListener('touchstart', moveHandler);
            document.addEventListener('mouseleave',()=>{ mouseX=window.innerWidth/2; mouseY=window.innerHeight/2; });
            animateWatcher(); 
        }

        function animateBuddha(){ drawBuddha(); buddhaAnimId=requestAnimationFrame(animateBuddha); }
        
        // ===== 助眠音频系统 =====
        let activeSleepType = null;
        const bonfireAudio = new Audio();
        const oceanAudio = new Audio();
        const snowhouseAudio = new Audio();
        const rainAudioReborn = new Audio();
        const trainAudio = new Audio();
        const galaxyAudio = new Audio();

        [bonfireAudio, oceanAudio, snowhouseAudio, rainAudioReborn, trainAudio, galaxyAudio].forEach(audio => {
            audio.loop = true;
            audio.volume = 0.5;
            audio.preload = 'auto';
        });
        bonfireAudio.src = "【白噪音】夜晚的篝火丨噼里啪啦烧木头的声音（实景系列）.mp3";
        oceanAudio.src = "{ 白噪音 } 在大海中独自漂流.mp3";
        snowhouseAudio.src = "超舒适的雪日小木屋环境音助眠自习白噪音.mp3";
        rainAudioReborn.src = "世界公认最佳放松雨声，432HZ的雨声是能让人体达到极度舒适的频率，白噪音，聆听大自然，睡眠，助眠，下雨天，真实雨声，学习，冥想，放空，解压， .mp3";
        trainAudio.src = "在一趟温馨列车里  车内氛围  Lofi  白噪音   氛围音  环境音  看书写作陪伴学习自习室助眠减压与放松.mp3";
        galaxyAudio.src = "银河铁道之夜 宇宙列车氛围 复古白噪音 50s背景音乐  放松  宇宙第二宅.mp3";

        function stopSleepMusic() {
            [bonfireAudio, oceanAudio, snowhouseAudio, rainAudioReborn, trainAudio, galaxyAudio].forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            document.querySelectorAll('.sound-btn').forEach(b=>b.classList.remove('active'));
            activeSleepType = null;
        }

        function getSleepAudioByType(type) {
            switch(type) {
                case 'bonfire': return bonfireAudio;
                case 'ocean': return oceanAudio;
                case 'snowhouse': return snowhouseAudio;
                case 'rain': return rainAudioReborn;
                case 'train': return trainAudio;
                case 'galaxy': return galaxyAudio;
                default: return null;
            }
        }

        async function toggleSound(type, el) {
            if (activeSleepType === type) {
                const targetAudio = getSleepAudioByType(type);
                if (targetAudio) targetAudio.pause();
                el.classList.remove('active');
                activeSleepType = null;
                return;
            }
            stopSleepMusic();
            const targetAudio = getSleepAudioByType(type);
            if (!targetAudio) return;
            try {
                targetAudio.currentTime = 0;
                if (targetAudio.readyState < 2) {
                    await new Promise(resolve => {
                        const onCanPlay = () => {
                            targetAudio.removeEventListener('canplaythrough', onCanPlay);
                            resolve();
                        };
                        targetAudio.addEventListener('canplaythrough', onCanPlay);
                        targetAudio.load();
                        setTimeout(resolve, 2000);
                    });
                }
                await targetAudio.play();
                el.classList.add('active');
                activeSleepType = type;
                const volSlider = document.querySelector('.volume-slider');
                if(volSlider) targetAudio.volume = volSlider.value / 100;
            } catch (err) {
                console.error(`播放 ${type} 失败:`, err);
                el.classList.remove('active');
                activeSleepType = null;
            }
        }

        function updateVolume(v) {
            document.getElementById('vol-display').textContent = v;
            if (activeSleepType) {
                const targetAudio = getSleepAudioByType(activeSleepType);
                if (targetAudio) targetAudio.volume = v / 100;
            }
        }
        
        function bindOtherButtons() {
            const btns = document.querySelectorAll('.sound-btn[data-sound]');
            btns.forEach(btn => {
                btn.removeAttribute('onclick');
                const soundType = btn.getAttribute('data-sound');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSound(soundType, btn);
                });
            });
        }
        
        function initRainButton() {
            const rainBtn = document.getElementById('rain-btn-reborn');
            if (!rainBtn) return;
            rainBtn.removeAttribute('onclick');
            rainBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (activeSleepType === 'rain') {
                    rainAudioReborn.pause();
                    rainBtn.classList.remove('active');
                    activeSleepType = null;
                    return;
                }
                stopSleepMusic();
                try {
                    rainAudioReborn.currentTime = 0;
                    if (rainAudioReborn.readyState < 2) {
                        await new Promise(resolve => {
                            const onCan = () => {
                                rainAudioReborn.removeEventListener('canplaythrough', onCan);
                                resolve();
                            };
                            rainAudioReborn.addEventListener('canplaythrough', onCan);
                            rainAudioReborn.load();
                            setTimeout(resolve, 2000);
                        });
                    }
                    await rainAudioReborn.play();
                    rainBtn.classList.add('active');
                    activeSleepType = 'rain';
                    const volSlider = document.querySelector('.volume-slider');
                    if(volSlider) rainAudioReborn.volume = volSlider.value / 100;
                } catch(err) {
                    console.error('落雨音频播放失败:', err);
                    rainBtn.classList.remove('active');
                    activeSleepType = null;
                }
            });
        }
        
        function initAllSleepButtons() {
            bindOtherButtons();
            initRainButton();
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAllSleepButtons);
        } else {
            initAllSleepButtons();
        }
        
        updateTimerDisplay();
    </script>
